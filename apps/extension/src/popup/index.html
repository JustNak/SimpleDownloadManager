<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Download Manager</title>
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body class="popup-page">
    <main class="popup-shell" aria-label="Simple Download Manager quick actions">
      <header class="popup-header">
        <div class="brand-lockup">
          <img class="brand-icon" src="./icons/icon-32.png" alt="" />
          <div class="brand-text">
            <h1>Simple Download Manager</h1>
            <p>Browser handoff</p>
          </div>
        </div>
        <span id="connection-status" class="status checking">Checking</span>
      </header>

      <section class="popup-summary" aria-label="Download queue summary">
        <div class="summary-metric">
          <span class="metric-label">Active</span>
          <span id="active-count" class="metric-value">0</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-metric">
          <span class="metric-label">Attention</span>
          <span id="attention-count" class="metric-value warning-value">0</span>
        </div>
      </section>

      <section class="control compact-control">
        <div>
          <div id="capture-mode-label" class="label">Ask Before Sending</div>
          <div id="silent-download-hint" class="hint">Ask before sending downloads.</div>
        </div>
        <label class="switch" for="silent-download-toggle" aria-label="Toggle silent downloads">
          <input id="silent-download-toggle" type="checkbox" />
          <span class="track"></span>
          <span class="thumb"></span>
        </label>
      </section>

      <div class="actions">
        <button id="extension-toggle-button" type="button" class="button danger">Disable Extension</button>
        <button id="advanced-button" type="button" class="button primary">Advanced</button>
      </div>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
